<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova. RH — Gestão de Equipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"></noscript>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css"></noscript>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--black:#0e0f12;--cream:#f2eee5;--lime:#d7ff3d;--gold:#b6904a;--white:#fff;--s2:#f7f5f0;--border:#e8e3d8;--border2:#d4cec0;--text:#0e0f12;--text2:#6b6558;--text3:#a09890;--r:6px;--rl:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--black);color:#fff;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-logo{padding:28px 24px 22px;border-bottom:1px solid rgba(255,255,255,.08);}
.logo-mark{display:flex;align-items:baseline;}
.logo-text{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--cream);}
.logo-dot{width:9px;height:9px;background:var(--lime);border-radius:50%;display:inline-block;margin-left:2px;margin-bottom:1px;}
.logo-sub{font-size:10px;font-weight:500;color:rgba(242,238,229,.4);letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.sidebar-nav{padding:20px 0;flex:1;}
.nav-s{padding:8px 24px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.25);}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.5);transition:all .15s;border-left:2px solid transparent;}
.nav-item.active{color:var(--lime);border-left-color:var(--lime);background:rgba(215,255,61,.06);}
.nav-item.dis{opacity:.25;cursor:not-allowed;pointer-events:none;}
.nav-item i{font-size:16px;}
.sidebar-footer{padding:18px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.25);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-tabs{display:flex;gap:4px;}
.ttab{padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--text2);border-radius:var(--r);}
.ttab.active{background:var(--black);color:var(--lime);}
.topbar-actions{display:flex;gap:8px;}
.content{flex:1;padding:28px 32px;overflow-y:auto;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--white);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn:hover{background:var(--s2);}
.btn-primary{background:var(--black);color:var(--lime);border-color:var(--black);}
.btn-primary:hover{background:#1e2026;}
.btn-sm{padding:7px 12px;font-size:12px;}
.card-del{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px;font-size:14px;flex-shrink:0;}
.card-del:hover{color:#8b1c1c;}
/* ORGANOGRAMA */
.orgchart-wrap{overflow-x:auto;padding:10px 0 30px;}
.tree, .tree ul{display:flex;justify-content:center;list-style:none;}
.tree{padding-top:6px;}
.tree li{list-style:none;position:relative;padding:26px 10px 0 10px;display:flex;flex-direction:column;align-items:center;}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;width:50%;height:26px;border-top:2px solid var(--border2);}
.tree li::before{right:50%;}
.tree li::after{left:50%;border-left:2px solid var(--border2);}
.tree li:only-child::before,.tree li:only-child::after{display:none;}
.tree li:only-child{padding-top:0;}
.tree li:first-child::before,.tree li:last-child::after{border:0 none;}
.tree li:last-child::before{border-right:2px solid var(--border2);border-radius:0 6px 0 0;}
.tree li:first-child::after{border-radius:6px 0 0 0;}
.tree ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--border2);width:0;height:26px;}
.org-box{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;min-width:170px;text-align:left;display:flex;gap:10px;align-items:center;border-top:3px solid;box-shadow:0 1px 3px rgba(14,15,18,.04);}
.org-avatar{width:34px;height:34px;border-radius:50%;background:var(--black);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12.5px;font-weight:800;color:var(--lime);}
.org-nome{font-weight:800;font-size:13px;line-height:1.25;}
.org-cargo{font-size:11px;color:var(--text2);margin-top:1px;}
/* FUNÇÕES */
.grid{display:grid;gap:14px;}
.func-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;position:relative;}
.func-card .fnome{font-weight:800;font-size:14px;padding-right:20px;}
.func-card .farea{font-size:11.5px;color:var(--text2);margin-bottom:8px;}
.func-card p{font-size:13px;margin-bottom:8px;line-height:1.5;}
.func-card ul{padding-left:18px;font-size:12.5px;color:var(--text2);line-height:1.7;}
.func-card .card-del{position:absolute;top:14px;right:14px;}
/* CALENDÁRIO / AGENDA */
.cal-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.cal-views{display:flex;gap:4px;background:var(--s2);border-radius:var(--r);padding:3px;}
.cv-btn{border:none;background:transparent;padding:7px 13px;font-size:12px;font-weight:700;border-radius:5px;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;}
.cv-btn.active{background:var(--black);color:var(--lime);}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-label{font-size:13px;font-weight:800;margin-left:6px;min-width:150px;}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.fsel{border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;font-size:13px;background:var(--white);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.status-pill.concluido{background:#e8f8ef;color:#1a5c35;}
.status-pill.pendente{background:#fef8ec;color:#7d4e00;}
.status-pill.atrasado{background:#fdeaea;color:#8b1c1c;}
.obs{font-size:11.5px;color:var(--text3);margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-state i{font-size:32px;display:block;margin-bottom:8px;}
/* DIA */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.day-card-actions{display:flex;gap:6px;flex-shrink:0;}
/* SEMANA */
.cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.cal-week-col{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:10px;min-height:150px;cursor:pointer;transition:border-color .15s;}
.cal-week-col:hover{border-color:var(--border2);}
.cal-week-col.today{border-color:var(--black);}
.cal-week-head{font-size:10.5px;font-weight:800;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:2px;}
.cal-week-date{font-size:15px;font-weight:900;text-align:center;margin-bottom:8px;}
.cal-mini{font-size:10.5px;font-weight:700;padding:4px 6px;border-radius:5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-mini.pendente{background:#fef8ec;color:#7d4e00;}
.cal-mini.atrasado{background:#fdeaea;color:#8b1c1c;}
.cal-mini.concluido{background:#e8f8ef;color:#1a5c35;}
/* MÊS */
.cal-month-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
.cal-month-head div{font-size:10.5px;font-weight:800;text-transform:uppercase;color:var(--text3);text-align:center;}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-cell{background:var(--white);border:1px solid var(--border);border-radius:8px;min-height:88px;padding:6px 7px;cursor:pointer;transition:border-color .15s;}
.cal-day-cell:hover{border-color:var(--border2);}
.cal-day-cell.out{opacity:.35;}
.cal-day-cell.today{border-color:var(--black);box-shadow:inset 0 0 0 1px var(--black);}
.cal-day-num{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:4px;}
.cal-more{font-size:10px;color:var(--text3);font-weight:700;}
/* ANO */
.cal-year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.cal-year-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:border-color .15s;}
.cal-year-card:hover{border-color:var(--border2);}
.cal-year-month{font-weight:800;font-size:13px;margin-bottom:6px;}
.cal-year-count{font-size:11px;color:var(--text2);}
.cal-year-dots{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.cal-year-dots span{width:7px;height:7px;border-radius:50%;}
/* RELATÓRIOS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:700;}
tr:last-child td{border-bottom:none;}
.tab-page{display:none;}
.tab-page.active{display:block;}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(14,15,18,.55);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--rl);width:480px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;}
.modal-h{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:800;}
.modal-close{background:transparent;border:none;font-size:18px;cursor:pointer;color:var(--text2);}
.modal-b{padding:22px 24px;overflow-y:auto;}
.modal-f{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;}
.fi,.fs,.ft{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--white);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;font-weight:500;outline:none;width:100%;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--black);}
.ft{resize:vertical;min-height:64px;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:var(--cream);padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:#8b1c1c;}
.toast.ok{background:#1a5c35;}
.toast.warn{background:#7d4e00;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><span class="logo-text">NOVA</span><span class="logo-dot"></span></div>
      <div class="logo-sub">Sistema de RH</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-s">Módulos</div>
      <div class="nav-item dis"><i class="ti ti-user-search"></i> R&amp;S</div>
      <div class="nav-item dis"><i class="ti ti-file-check"></i> Admissão</div>
      <div class="nav-item dis"><i class="ti ti-clock"></i> Experiência</div>
      <div class="nav-item dis"><i class="ti ti-notebook"></i> Dossiê</div>
      <div class="nav-item dis"><i class="ti ti-file-minus"></i> Rescisão</div>
      <div class="nav-item dis"><i class="ti ti-send"></i> Solicitações</div>
      <div class="nav-item active"><i class="ti ti-sitemap"></i> Equipe</div>
    </nav>
    <div class="sidebar-footer">Módulo 8 · Gestão de Equipe</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Gestão de Equipe</div>
        <div class="topbar-tabs">
          <div class="ttab active" id="ttab-organograma" onclick="showTab('organograma')">Organograma</div>
          <div class="ttab" id="ttab-funcoes" onclick="showTab('funcoes')">Funções</div>
          <div class="ttab" id="ttab-agenda" onclick="showTab('agenda')">Agenda</div>
          <div class="ttab" id="ttab-relatorios" onclick="showTab('relatorios')">Relatórios</div>
        </div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <!-- ORGANOGRAMA -->
    <div class="content tab-page active" id="view-organograma">
      <div class="orgchart-wrap"><div id="organograma-body"></div></div>
    </div>

    <!-- FUNÇÕES -->
    <div class="content tab-page" id="view-funcoes">
      <div class="grid" id="funcoes-body" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))"></div>
    </div>

    <!-- AGENDA -->
    <div class="content tab-page" id="view-agenda">
      <div class="cal-toolbar">
        <div class="cal-views">
          <button class="cv-btn" data-v="dia" onclick="calSetView('dia')">Dia</button>
          <button class="cv-btn" data-v="semana" onclick="calSetView('semana')">Semana</button>
          <button class="cv-btn active" data-v="mes" onclick="calSetView('mes')">Mês</button>
          <button class="cv-btn" data-v="ano" onclick="calSetView('ano')">Ano</button>
        </div>
        <div class="cal-nav">
          <button class="btn btn-sm" onclick="calNav(-1)"><i class="ti ti-chevron-left"></i></button>
          <button class="btn btn-sm" onclick="calToday()">Hoje</button>
          <button class="btn btn-sm" onclick="calNav(1)"><i class="ti ti-chevron-right"></i></button>
          <span class="cal-label" id="cal-label"></span>
        </div>
      </div>
      <div class="filters">
        <select class="fsel" id="ag-f-resp" onchange="renderAgenda()"><option value="">Todos os colaboradores</option></select>
        <select class="fsel" id="ag-f-area" onchange="renderAgenda()"><option value="">Todas as áreas</option></select>
        <select class="fsel" id="ag-f-status" onchange="renderAgenda()">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="atrasado">Atrasado</option>
          <option value="concluido">Concluído</option>
        </select>
      </div>
      <div id="agenda-body"></div>
    </div>

    <!-- RELATORIOS -->
    <div class="content tab-page" id="view-relatorios">
      <div class="filters">
        <select class="fsel" id="rel-f-resp" onchange="renderRelatorios()"><option value="">Todos os colaboradores</option></select>
        <select class="fsel" id="rel-f-area" onchange="renderRelatorios()"><option value="">Todas as áreas</option></select>
      </div>
      <div class="card"><table>
        <thead><tr><th>Colaborador</th><th>Área</th><th>Demanda</th><th>Status</th><th>Concluído por</th><th>Data de conclusão</th></tr></thead>
        <tbody id="relatorios-body"></tbody>
      </table></div>
    </div>

  </div>
</div>

<!-- MODAL COLABORADOR -->
<div class="overlay" id="modal-colab">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Adicionar Colaborador</span><button class="modal-close" onclick="closeModal('modal-colab')">✕</button></div>
    <div class="modal-b">
      <div class="fg"><label class="fl">Nome</label><input class="fi" type="text" id="nc-nome" placeholder="Nome completo"></div>
      <div class="fg-row">
        <div class="fg"><label class="fl">Cargo</label><input class="fi" type="text" id="nc-cargo" placeholder="Ex: Analista de RH"></div>
        <div class="fg"><label class="fl">Área</label>
          <div style="display:flex;gap:6px">
            <select class="fs" id="nc-area" onchange="handleAreaSelectChange(this)" style="flex:1"></select>
            <button type="button" class="btn btn-sm" title="Remover área selecionada" onclick="removerArea('nc-area')"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg"><label class="fl">Reporta para</label><select class="fs" id="nc-reporta"><option value="">Nenhum (topo)</option></select></div>
        <div class="fg"><label class="fl">Tempo de casa</label><input class="fi" type="text" id="nc-tempo" placeholder="Ex: 1 ano e 2 meses"></div>
      </div>
    </div>
    <div class="modal-f"><button class="btn" onclick="closeModal('modal-colab')">Cancelar</button><button class="btn btn-primary" onclick="salvarColaborador()">Salvar</button></div>
  </div>
</div>

<!-- MODAL FUNÇÃO -->
<div class="overlay" id="modal-funcao">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Nova Função</span><button class="modal-close" onclick="closeModal('modal-funcao')">✕</button></div>
    <div class="modal-b">
      <div class="fg-row">
        <div class="fg"><label class="fl">Nome da função</label><input class="fi" type="text" id="nf-nome" placeholder="Ex: Analista de RH"></div>
        <div class="fg"><label class="fl">Área</label>
          <div style="display:flex;gap:6px">
            <select class="fs" id="nf-area" onchange="handleAreaSelectChange(this)" style="flex:1"></select>
            <button type="button" class="btn btn-sm" title="Remover área selecionada" onclick="removerArea('nf-area')"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
      <div class="fg"><label class="fl">Descrição</label><textarea class="ft" id="nf-desc" placeholder="Resumo da função"></textarea></div>
      <div class="fg"><label class="fl">Principais atividades (uma por linha)</label><textarea class="ft" id="nf-ativ" placeholder="Ex: Inspeções de segurança"></textarea></div>
    </div>
    <div class="modal-f"><button class="btn" onclick="closeModal('modal-funcao')">Cancelar</button><button class="btn btn-primary" onclick="salvarFuncao()">Salvar</button></div>
  </div>
</div>

<!-- MODAL DEMANDA -->
<div class="overlay" id="modal-demanda">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Nova Demanda</span><button class="modal-close" onclick="closeModal('modal-demanda')">✕</button></div>
    <div class="modal-b">
      <div class="fg"><label class="fl">Demanda</label><input class="fi" type="text" id="nd-nome" placeholder="Ex: DDS — Diálogo Diário de Segurança"></div>
      <div class="fg-row">
        <div class="fg"><label class="fl">Responsável</label><select class="fs" id="nd-resp"></select></div>
        <div class="fg"><label class="fl">Periodicidade</label>
          <select class="fs" id="nd-period">
            <option>Diária</option><option>Semanal</option><option>Quinzenal</option>
            <option selected>Mensal</option><option>Trimestral</option><option>Semestral</option><option>Anual</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">Data prevista</label><input class="fi" type="date" id="nd-data"></div>
      <div class="fg"><label class="fl">Observação (opcional)</label><textarea class="ft" id="nd-obs" placeholder="Contexto adicional"></textarea></div>
    </div>
    <div class="modal-f"><button class="btn" onclick="closeModal('modal-demanda')">Cancelar</button><button class="btn btn-primary" onclick="salvarDemanda()">Salvar</button></div>
  </div>
</div>

<!-- MODAL CONCLUIR DEMANDA -->
<div class="overlay" id="modal-concluir">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Concluir Demanda</span><button class="modal-close" onclick="closeModal('modal-concluir')">✕</button></div>
    <div class="modal-b">
      <div class="fg"><label class="fl">Demanda</label><div id="mc-nome-demanda" style="font-weight:700;font-size:13.5px"></div></div>
      <div class="fg-row">
        <div class="fg"><label class="fl">Data de conclusão</label><input class="fi" type="date" id="mc-data"></div>
        <div class="fg"><label class="fl">Concluído por</label><select class="fs" id="mc-quem"></select></div>
      </div>

// ────────────────────────────────────────────────
// HELPERS

function pad2(n){return n<10?'0'+n:''+n;}
function toISO(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function fromISO(iso){var p=iso.split('-');return new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10));}
function formatBR(iso){if(!iso)return '—';var d=fromISO(iso);return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear();}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function areaNome(id){var a=AREAS.find(function(x){return x.id===id});return a?a.nome:'—';}
function areaCor(id){var a=AREAS.find(function(x){return x.id===id});return a?a.cor:'#a09890';}
function colabNome(id){var c=COLABORADORES.find(function(x){return x.id===id});return c?c.nome:'—';}
function colabArea(id){var c=COLABORADORES.find(function(x){return x.id===id});return c?c.area:'';}
function iniciais(nome){return nome.split(' ').map(function(p){return p[0]}).slice(0,2).join('').toUpperCase();}
function statusLabel(s){return s==='concluido' ? 'Concluído' : (s==='atrasado' ? 'Atrasado' : 'Pendente');}

function nodeHTML(c){
  return '<div class="org-box" style="border-top-color:'+areaCor(c.area)+'">'
    +'<div class="org-avatar">'+iniciais(c.nome)+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div class="org-nome">'+c.nome+'</div>'
    +'<div class="org-cargo">'+c.cargo+'</div>'
    +'</div>'
    +'<button class="card-del" title="Remover" onclick="event.stopPropagation();removerColaborador(\''+c.id+'\')"><i class="ti ti-x"></i></button>'
    +'</div>';
}
function buildTree(parentId){
  var filhos = COLABORADORES.filter(function(c){return c.reportaPara===parentId});
  if(!filhos.length) return '';
  return '<ul>'+filhos.map(function(c){
    return '<li>'+nodeHTML(c)+buildTree(c.id)+'</li>';
  }).join('')+'</ul>';
}
function renderOrganograma(){
  var el = document.getElementById('organograma-body');
  var raizes = COLABORADORES.filter(function(c){return !c.reportaPara});
  if(!raizes.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-sitemap"></i>Nenhum colaborador cadastrado.</div>'; return; }
  el.innerHTML = '<ul class="tree">'+raizes.map(function(r){

function demandasFiltradas(){

// ────────────────────────────────────────────────
// AGENDA — CALENDÁRIO (dia / semana / mês / ano)
// ────────────────────────────────────────────────
var CAL_VIEW = 'mes';
var CAL_DATE = new Date();

function calSetView(v){
  CAL_VIEW = v;
  document.querySelectorAll('.cv-btn').forEach(function(b){b.classList.toggle('active', b.dataset.v===v)});
  renderAgenda();
}
function calNav(delta){
  if(CAL_VIEW==='dia') CAL_DATE.setDate(CAL_DATE.getDate()+delta);
  else if(CAL_VIEW==='semana') CAL_DATE.setDate(CAL_DATE.getDate()+delta*7);
  else if(CAL_VIEW==='mes') CAL_DATE.setMonth(CAL_DATE.getMonth()+delta);
  else CAL_DATE.setFullYear(CAL_DATE.getFullYear()+delta);
  renderAgenda();
}
function calToday(){ CAL_DATE = new Date(); renderAgenda(); }
function calGoTo(iso, view){ CAL_DATE = fromISO(iso); CAL_VIEW = view||'dia'; document.querySelectorAll('.cv-btn').forEach(function(b){b.classList.toggle('active', b.dataset.v===CAL_VIEW)}); renderAgenda(); }

function renderAgenda(){
  var lista = demandasFiltradas();
  var body = document.getElementById('agenda-body');
  var label = document.getElementById('cal-label');

  if(CAL_VIEW==='dia'){
    label.textContent = CAL_DATE.getDate()+' de '+MES_NOMES[CAL_DATE.getMonth()]+' de '+CAL_DATE.getFullYear();
    renderDia(body, lista);
  } else if(CAL_VIEW==='semana'){
    var ini = new Date(CAL_DATE); ini.setDate(ini.getDate()-ini.getDay());
    var fim = new Date(ini); fim.setDate(fim.getDate()+6);
    label.textContent = ini.getDate()+' '+MES_CURTO[ini.getMonth()]+' – '+fim.getDate()+' '+MES_CURTO[fim.getMonth()]+' '+fim.getFullYear();
    renderSemana(body, lista, ini);
  } else if(CAL_VIEW==='mes'){
    label.textContent = MES_NOMES[CAL_DATE.getMonth()]+' de '+CAL_DATE.getFullYear();
    renderMes(body, lista);
  } else {
    label.textContent = ''+CAL_DATE.getFullYear();
    renderAno(body, lista);
  }
}

function dayCardHTML(d){
  var acoes = d.status==='concluido' ? '' :
    '<button class="btn btn-sm" onclick="abrirConcluirModal(\''+d.id+'\')"><i class="ti ti-check"></i> Concluir</button>'
    +(d.status==='atrasado' ? ' <button class="btn btn-sm" onclick="justificarDemanda(\''+d.id+'\')">Justificar</button>' : '');
  var infoLinha = colabNome(d.respId)+' · '+d.periodicidade+(d.obs?' · '+d.obs:'');
  if(d.status==='concluido') infoLinha += ' · Concluído por '+colabNome(d.concluidoPor)+' em '+formatBR(d.dataConclusao);
  return '<div class="day-card">'
    +'<div>'
    +'<div style="font-weight:700;font-size:13.5px">'+d.nome+'</div>'
    +'<div class="obs">'+infoLinha+'</div>'
    +'<div style="margin-top:8px"><span class="status-pill '+d.status+'">'+statusLabel(d.status)+'</span></div>'
    +'</div>'
    +'<div class="day-card-actions">'+acoes+'<button class="card-del" title="Remover" onclick="removerDemanda(\''+d.id+'\')"><i class="ti ti-x"></i></button></div>'
    +'</div>';
}

function renderDia(body, lista){
  var dia = lista.filter(function(d){ return sameDay(fromISO(d.dataPrevista), CAL_DATE); });
  if(!dia.length){ body.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i>Nenhuma demanda neste dia.</div>'; return; }
  body.innerHTML = dia.map(dayCardHTML).join('');
}

function renderSemana(body, lista, inicioSemana){
  var hoje = new Date();
  var html = '<div class="cal-week-grid">';
  for(var i=0;i<7;i++){
    var d = new Date(inicioSemana); d.setDate(d.getDate()+i);
    var iso = toISO(d);
    var doDia = lista.filter(function(x){ return x.dataPrevista===iso; });
    var isHoje = sameDay(d, hoje);
    html += '<div class="cal-week-col'+(isHoje?' today':'')+'" onclick="calGoTo(\''+iso+'\',\'dia\')">'
      +'<div class="cal-week-head">'+DIA_CURTO[d.getDay()]+'</div>'
      +'<div class="cal-week-date">'+d.getDate()+'</div>'
      +doDia.map(function(x){ return '<div class="cal-mini '+x.status+'" title="'+x.nome+'">'+x.nome+'</div>'; }).join('')
      +'</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

function renderMes(body, lista){
  var ano = CAL_DATE.getFullYear(), mes = CAL_DATE.getMonth();
  var primeiro = new Date(ano, mes, 1);
  var offset = primeiro.getDay();
  var diasNoMes = new Date(ano, mes+1, 0).getDate();
  var totalCells = Math.ceil((offset+diasNoMes)/7)*7;
  var hoje = new Date();

  var porDia = {};
  lista.forEach(function(x){ (porDia[x.dataPrevista] = porDia[x.dataPrevista]||[]).push(x); });

  var head = '<div class="cal-month-head">'+DIA_CURTO.map(function(x){return '<div>'+x+'</div>'}).join('')+'</div>';
  var grid = '<div class="cal-month-grid">';
  for(var i=0;i<totalCells;i++){
    var diaNum = i-offset+1;
    var d = new Date(ano, mes, diaNum);
    var iso = toISO(d);
    var inMonth = diaNum>=1 && diaNum<=diasNoMes;
    var itens = porDia[iso]||[];
    var isHoje = sameDay(d, hoje);
    grid += '<div class="cal-day-cell'+(inMonth?'':' out')+(isHoje?' today':'')+'" onclick="calGoTo(\''+iso+'\',\'dia\')">'
      +'<div class="cal-day-num">'+d.getDate()+'</div>'
      +itens.slice(0,2).map(function(x){ return '<div class="cal-mini '+x.status+'" title="'+x.nome+'">'+x.nome+'</div>'; }).join('')
      +(itens.length>2 ? '<div class="cal-more">+'+(itens.length-2)+' outra(s)</div>' : '')
      +'</div>';
  }
  grid += '</div>';
  body.innerHTML = head+grid;
}

function renderAno(body, lista){
  var ano = CAL_DATE.getFullYear();
  var html = '<div class="cal-year-grid">';
  for(var m=0;m<12;m++){
    var doMes = lista.filter(function(x){ var d=fromISO(x.dataPrevista); return d.getFullYear()===ano && d.getMonth()===m; });
    var cores = doMes.slice(0,10).map(function(x){
      var c = x.status==='concluido' ? '#1a5c35' : (x.status==='atrasado' ? '#8b1c1c' : '#7d4e00');
      return '<span style="background:'+c+'"></span>';
    }).join('');
    html += '<div class="cal-year-card" onclick="CAL_DATE=new Date('+ano+','+m+',1);calSetView(\'mes\')">'
      +'<div class="cal-year-month">'+MES_NOMES[m]+'</div>'
      +'<div class="cal-year-count">'+doMes.length+' demanda(s)</div>'
      +'<div class="cal-year-dots">'+cores+'</div>'
      +'</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

var CONCLUIR_ALVO = null;
function abrirConcluirModal(id){
  var d = DEMANDAS.find(function(x){return x.id===id});
  if(!d) return;
  CONCLUIR_ALVO = id;
  document.getElementById('mc-nome-demanda').textContent = d.nome;
  document.getElementById('mc-data').value = toISO(new Date());
  populaSelectResp('mc-quem');
  document.getElementById('mc-quem').value = d.respId;
  var justifWrap = document.getElementById('mc-justif-wrap');
  var justifInput = document.getElementById('mc-justif');
  if(d.status==='atrasado'){
    justifWrap.style.display='block';
    justifInput.value = (d.obs||'').replace(/^Justificativa:\s*/,'');
  } else {
    justifWrap.style.display='none';
    justifInput.value='';
  }
  openModal('modal-concluir');
}
function confirmarConclusao(){
  var d = DEMANDAS.find(function(x){return x.id===CONCLUIR_ALVO});
  if(!d) return;
  var data = document.getElementById('mc-data').value;
  var quem = document.getElementById('mc-quem').value;
  if(!data){ toast('Informe a data de conclusão.','err'); return; }
  var justifWrap = document.getElementById('mc-justif-wrap');
  if(justifWrap.style.display!=='none'){
    var j = document.getElementById('mc-justif').value.trim();
    if(!j){ toast('Informe a justificativa do atraso.','err'); return; }
    d.obs = 'Justificativa: '+j;
  }
  d.status='concluido';
  d.dataConclusao=data;
  d.concluidoPor=quem;
  toast('Demanda concluída (mock — ainda não grava no Firestore).','ok');
  closeModal('modal-concluir');
  renderAgenda(); renderRelatorios();
}
function justificarDemanda(id){
  var d = DEMANDAS.find(function(x){return x.id===id});
  if(!d) return;
  var just = prompt('Justificativa do atraso:', d.obs||'');
  if(just===null) return;
  d.obs = 'Justificativa: '+just;
  toast('Justificativa registrada (mock).','ok');
  renderAgenda();
}
function removerDemanda(id){
  if(!confirm('Remover esta demanda?')) return;
  DEMANDAS = DEMANDAS.filter(function(d){return d.id!==id});
  toast('Demanda removida (mock).','ok');
  renderAgenda(); renderRelatorios();
}

function renderRelatorios(){
  var fResp = document.getElementById('rel-f-resp').value;
  var fArea = document.getElementById('rel-f-area').value;
  var lista = DEMANDAS.filter(function(d){
    if(fResp && d.respId!==fResp) return false;
    if(fArea && colabArea(d.respId)!==fArea) return false;
    return true;
  });
  var el = document.getElementById('relatorios-body');
  if(!lista.length){ el.innerHTML='<tr><td colspan="6" style="color:var(--text3);text-align:center;padding:24px">Nenhum registro encontrado.</td></tr>'; return; }
  el.innerHTML = lista.map(function(d){
    return '<tr>'
      +'<td>'+colabNome(d.respId)+'</td>'
      +'<td>'+areaNome(colabArea(d.respId))+'</td>'
      +'<td>'+d.nome+'</td>'
      +'<td><span class="status-pill '+d.status+'">'+statusLabel(d.status)+'</span></td>'
      +'<td>'+(d.concluidoPor ? colabNome(d.concluidoPor) : '—')+'</td>'
      +'<td>'+formatBR(d.dataConclusao)+'</td>'
      +'</tr>';
  }).join('');
}

function populaSelectAreas(selectId){
  var sel = document.getElementById(selectId);
  var atual = sel.value;
  sel.innerHTML = AREAS.map(function(a){ return '<option value="'+a.id+'">'+a.nome+'</option>'; }).join('')
    +'<option value="__nova__">+ Nova área…</option>';
  if(atual && AREAS.some(function(a){return a.id===atual})) sel.value = atual;
}
function removerArea(selectId){
  var sel = document.getElementById(selectId);
  var id = sel.value;
  if(!id || id==='__nova__'){ toast('Selecione uma área para remover.','err'); return; }
  if(id==='geral'){ toast('A área de Coordenação não pode ser removida.','err'); return; }
  var area = AREAS.find(function(a){return a.id===id});
  if(!area) return;
  var qtd = COLABORADORES.filter(function(c){return c.area===id}).length;
  var msg = 'Remover a área "'+area.nome+'"?'+(qtd?' '+qtd+' colaborador(es) ficarão sem área definida.':'');
  if(!confirm(msg)) return;
  COLABORADORES.forEach(function(c){ if(c.area===id) c.area=''; });
  AREAS = AREAS.filter(function(a){return a.id!==id});
  toast('Área removida (mock).','ok');
  document.querySelectorAll('#nc-area,#nf-area').forEach(function(s){ populaSelectAreas(s.id); });
  refreshFiltroSelects();
  renderOrganograma(); renderFuncoes(); renderAgenda(); renderRelatorios();
}
function handleAreaSelectChange(sel){
  if(sel.value !== '__nova__') return;
  var nome = prompt('Nome da nova área:');
  if(!nome || !nome.trim()){ sel.value = AREAS[0].id; return; }
  nome = nome.trim();
  var cor = COR_POOL[AREAS.length % COR_POOL.length];
  var novaArea = {id:'area_'+Date.now(), nome:nome, cor:cor};
  AREAS.push(novaArea);
  toast('Área "'+nome+'" criada (mock).','ok');
  document.querySelectorAll('#nc-area,#nf-area').forEach(function(s){
    var isThis = (s===sel);
    populaSelectAreas(s.id);
    if(isThis) s.value = novaArea.id;
  });
  refreshFiltroSelects();
}
function populaSelectReporta(){
  var sel = document.getElementById('nc-reporta');
  sel.innerHTML = '<option value="">Nenhum (topo)</option>'+COLABORADORES.map(function(c){
    return '<option value="'+c.id+'">'+c.nome+'</option>';
  }).join('');
}
function populaSelectResp(selectId){
  var sel = document.getElementById(selectId);
  sel.innerHTML = COLABORADORES.map(function(c){ return '<option value="'+c.id+'">'+c.nome+'</option>'; }).join('');
}

function openColabModal(){
  document.getElementById('nc-nome').value='';
  document.getElementById('nc-cargo').value='';
  document.getElementById('nc-tempo').value='';
  populaSelectAreas('nc-area');
  populaSelectReporta();
  openModal('modal-colab');
}
function salvarColaborador(){
  var nome = document.getElementById('nc-nome').value.trim();
  var cargo = document.getElementById('nc-cargo').value.trim();
  var area = document.getElementById('nc-area').value;
  var reporta = document.getElementById('nc-reporta').value || null;
  var tempo = document.getElementById('nc-tempo').value.trim();
  if(!nome || !cargo){ toast('Preencha nome e cargo.','err'); return; }
  COLABORADORES.push({id:'col_'+Date.now(), nome:nome, cargo:cargo, area:area, tempoCasa:tempo, reportaPara:reporta});
  toast('Colaborador adicionado (mock — ainda não grava no Firestore).','ok');
  closeModal('modal-colab');
  renderOrganograma(); refreshFiltroSelects(); renderAgenda(); renderRelatorios();
}

function openFuncaoModal(){
  document.getElementById('nf-nome').value='';
  document.getElementById('nf-desc').value='';
  document.getElementById('nf-ativ').value='';
  populaSelectAreas('nf-area');
  openModal('modal-funcao');
}
function salvarFuncao(){
  var nome = document.getElementById('nf-nome').value.trim();
  var area = document.getElementById('nf-area').value;
  var desc = document.getElementById('nf-desc').value.trim();
  var ativRaw = document.getElementById('nf-ativ').value;
  var ativ = ativRaw.split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length});
  if(!nome){ toast('Informe o nome da função.','err'); return; }
  FUNCOES.push({nome:nome, area:area, desc:desc, atividades:ativ});
  toast('Função adicionada (mock).','ok');
  closeModal('modal-funcao');
  renderFuncoes();
}

function openDemandaModal(){
  document.getElementById('nd-nome').value='';
  document.getElementById('nd-obs').value='';
  document.getElementById('nd-data').value = toISO(new Date());
  populaSelectResp('nd-resp');
  openModal('modal-demanda');
}
function salvarDemanda(){
  var nome = document.getElementById('nd-nome').value.trim();
  var respId = document.getElementById('nd-resp').value;
  var periodicidade = document.getElementById('nd-period').value;
  var dataPrevista = document.getElementById('nd-data').value;
  var obs = document.getElementById('nd-obs').value.trim();
  if(!nome || !dataPrevista){ toast('Preencha a demanda e a data prevista.','err'); return; }
  DEMANDAS.push({id:'dem_'+Date.now(), nome:nome, respId:respId, periodicidade:periodicidade, dataPrevista:dataPrevista, status:'pendente', obs:obs, dataConclusao:null});
  toast('Demanda adicionada (mock — ainda não grava no Firestore).','ok');
  closeModal('modal-demanda');
  renderAgenda(); renderRelatorios();
}

// ────────────────────────────────────────────────
// TOAST
// ────────────────────────────────────────────────
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type||'');
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2800);
}

// ────────────────────────────────────────────────
// BOOT
// ────────────────────────────────────────────────
refreshFiltroSelects();
renderOrganograma();
renderFuncoes();
renderAgenda();
renderRelatorios();
document.getElementById('topbar-actions').innerHTML = TAB_ACTIONS.organograma;
</script>
